name: CI/CD Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run tests
        run: echo "No tests yet"

      - name: Build Docker image
        run: docker build -t vaultgen .

      - name: Run container
        run: docker run -d -p 8080:80 vaultgen